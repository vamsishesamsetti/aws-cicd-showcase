services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      API_URL: http://api:3000
    depends_on:
      - api

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: local_dev_secret
      JWT_EXPIRES_IN: 7d
      AWS_REGION: us-east-1
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      DYNAMODB_USERS_TABLE: cicd-users
      DYNAMODB_TASKS_TABLE: cicd-tasks
    depends_on:
      dynamodb-local:
        condition: service_healthy
    restart: unless-stopped

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: -jar DynamoDBLocal.jar -sharedDb -inMemory
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8000' 2>/dev/null || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 10

  # One-time table bootstrap — runs once then exits
  dynamodb-setup:
    image: amazon/aws-cli:latest
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - /bin/sh
      - -c
      - |
        aws dynamodb create-table --table-name cicd-users --attribute-definitions AttributeName=userId,AttributeType=S AttributeName=email,AttributeType=S --key-schema AttributeName=userId,KeyType=HASH --global-secondary-indexes '[{"IndexName":"email-index","KeySchema":[{"AttributeName":"email","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"},"ProvisionedThroughput":{"ReadCapacityUnits":5,"WriteCapacityUnits":5}}]' --provisioned-throughput ReadCapacityUnits=5,WriteCapacityUnits=5 --endpoint-url http://dynamodb-local:8000 &&
        aws dynamodb create-table --table-name cicd-tasks --attribute-definitions AttributeName=userId,AttributeType=S AttributeName=taskId,AttributeType=S --key-schema AttributeName=userId,KeyType=HASH AttributeName=taskId,KeyType=RANGE --provisioned-throughput ReadCapacityUnits=5,WriteCapacityUnits=5 --endpoint-url http://dynamodb-local:8000
    restart: "no"
